<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Clock</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1b1b3a, #050510 65%);
      overflow-x: hidden;
      color: white;
      padding: 25px 12px;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: float 7s infinite alternate ease-in-out;
      z-index: 0;
    }

    body::before {
      background: #ff004c;
      left: 8%;
      top: 12%;
    }

    body::after {
      background: #00eaff;
      right: 8%;
      bottom: 12%;
      animation-delay: 2s;
    }

    @keyframes float {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(-35px) scale(1.12); }
    }

    .clock-card {
      position: relative;
      width: 420px;
      padding: 30px 24px;
      border-radius: 35px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(22px);
      box-shadow:
        0 0 45px rgba(0, 234, 255, 0.18),
        inset 0 0 25px rgba(255, 255, 255, 0.06);
      text-align: center;
      z-index: 2;
    }

    .title {
      font-size: 18px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #bdfcff;
      margin-bottom: 22px;
    }

    .circle-clock {
      width: 250px;
      height: 250px;
      margin: auto;
      border-radius: 50%;
      position: relative;
      background: conic-gradient(from 0deg, #00eaff, #ff004c, #ffe600, #00eaff);
      padding: 8px;
      animation: spinGlow 8s linear infinite;
    }

    @keyframes spinGlow {
      to { filter: hue-rotate(360deg); }
    }

    .clock-face {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #070716;
      position: relative;
      box-shadow: inset 0 0 25px rgba(0, 234, 255, 0.3);
    }

    .center-dot {
      position: absolute;
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px #fff;
      z-index: 10;
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: bottom center;
      border-radius: 20px;
    }

    .hour {
      width: 7px;
      height: 60px;
      background: #ffffff;
      box-shadow: 0 0 12px #fff;
    }

    .minute {
      width: 5px;
      height: 82px;
      background: #00eaff;
      box-shadow: 0 0 16px #00eaff;
    }

    .second {
      width: 3px;
      height: 92px;
      background: #ff004c;
      box-shadow: 0 0 16px #ff004c;
    }

    .number {
      position: absolute;
      width: 100%;
      height: 100%;
      text-align: center;
      font-size: 18px;
      color: #dffcff;
      padding-top: 12px;
    }

    .n1 { transform: rotate(30deg); }
    .n1 span { display: inline-block; transform: rotate(-30deg); }

    .n2 { transform: rotate(60deg); }
    .n2 span { display: inline-block; transform: rotate(-60deg); }

    .n3 { transform: rotate(90deg); }
    .n3 span { display: inline-block; transform: rotate(-90deg); }

    .n4 { transform: rotate(120deg); }
    .n4 span { display: inline-block; transform: rotate(-120deg); }

    .n5 { transform: rotate(150deg); }
    .n5 span { display: inline-block; transform: rotate(-150deg); }

    .n6 { transform: rotate(180deg); }
    .n6 span { display: inline-block; transform: rotate(-180deg); }

    .n7 { transform: rotate(210deg); }
    .n7 span { display: inline-block; transform: rotate(-210deg); }

    .n8 { transform: rotate(240deg); }
    .n8 span { display: inline-block; transform: rotate(-240deg); }

    .n9 { transform: rotate(270deg); }
    .n9 span { display: inline-block; transform: rotate(-270deg); }

    .n10 { transform: rotate(300deg); }
    .n10 span { display: inline-block; transform: rotate(-300deg); }

    .n11 { transform: rotate(330deg); }
    .n11 span { display: inline-block; transform: rotate(-330deg); }

    .n12 { transform: rotate(0deg); }

    .digital-time {
      margin-top: 26px;
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 0 18px rgba(0, 234, 255, 0.8);
    }

    .date {
      margin-top: 10px;
      font-size: 15px;
      color: #d5d5ff;
      letter-spacing: 1px;
    }

    .tagline {
      margin-top: 18px;
      padding: 10px 18px;
      display: inline-block;
      border-radius: 50px;
      background: rgba(0, 234, 255, 0.12);
      border: 1px solid rgba(0, 234, 255, 0.35);
      color: #bdfcff;
      font-size: 13px;
    }

    .tool-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 24px;
    }

    .tab-btn {
      padding: 11px 8px;
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 16px;
      color: white;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.11);
      border: 1px solid rgba(255, 255, 255, 0.18);
      transition: 0.3s;
    }

    .tab-btn:hover,
    .tab-btn.active {
      background: linear-gradient(135deg, #ff004c, #00eaff);
      box-shadow: 0 0 18px rgba(0, 234, 255, 0.35);
      transform: translateY(-2px);
    }

    .panel {
      display: none;
      margin-top: 18px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .panel.active {
      display: block;
    }

    .panel-title {
      font-size: 16px;
      color: #bdfcff;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    input {
      width: 150px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      outline: none;
      background: rgba(255, 255, 255, 0.13);
      color: white;
      text-align: center;
      font-size: 15px;
    }

    input::placeholder {
      color: #c7c7d9;
    }

    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }

    .action-btn {
      padding: 11px 14px;
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 15px;
      color: white;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.20);
      transition: 0.25s;
      margin: 5px;
    }

    .action-btn:hover {
      transform: translateY(-2px);
      background: rgba(0, 234, 255, 0.18);
      box-shadow: 0 0 14px rgba(0, 234, 255, 0.25);
    }

    .set-btn {
      background: linear-gradient(135deg, #00eaff, #0066ff);
    }

    .off-btn {
      background: linear-gradient(135deg, #ff004c, #ff6a00);
    }

    .reset-btn {
      background: linear-gradient(135deg, #8a2be2, #ff004c);
    }

    .status {
      margin-top: 12px;
      color: #d5d5ff;
      font-size: 14px;
      min-height: 20px;
    }

    .big-display {
      font-size: 34px;
      font-weight: 800;
      margin: 12px 0 14px;
      color: #00eaff;
      text-shadow: 0 0 15px rgba(0, 234, 255, 0.8);
      letter-spacing: 2px;
    }

    .ringing {
      animation: ringPulse 0.8s infinite alternate ease-in-out;
    }

    @keyframes ringPulse {
      from {
        box-shadow:
          0 0 45px rgba(0, 234, 255, 0.18),
          inset 0 0 25px rgba(255, 255, 255, 0.06);
      }
      to {
        box-shadow:
          0 0 70px rgba(255, 0, 76, 0.7),
          0 0 95px rgba(0, 234, 255, 0.35),
          inset 0 0 30px rgba(255, 255, 255, 0.12);
      }
    }

    @media (max-width: 480px) {
      .clock-card {
        width: 95%;
        padding: 26px 16px;
      }

      .circle-clock {
        width: 220px;
        height: 220px;
      }

      .digital-time {
        font-size: 32px;
      }

      .tool-tabs {
        gap: 7px;
      }

      .tab-btn {
        font-size: 12px;
        padding: 10px 5px;
      }

      .big-display {
        font-size: 30px;
      }

      input {
        width: 135px;
      }
    }
  </style>
</head>

<body>
  <div class="clock-card" id="clockCard">
    <div class="title">समय चक्र</div>

    <div class="circle-clock">
      <div class="clock-face">
        <div class="number n12"><span>12</span></div>
        <div class="number n1"><span>1</span></div>
        <div class="number n2"><span>2</span></div>
        <div class="number n3"><span>3</span></div>
        <div class="number n4"><span>4</span></div>
        <div class="number n5"><span>5</span></div>
        <div class="number n6"><span>6</span></div>
        <div class="number n7"><span>7</span></div>
        <div class="number n8"><span>8</span></div>
        <div class="number n9"><span>9</span></div>
        <div class="number n10"><span>10</span></div>
        <div class="number n11"><span>11</span></div>

        <div class="hand hour" id="hourHand"></div>
        <div class="hand minute" id="minuteHand"></div>
        <div class="hand second" id="secondHand"></div>
        <div class="center-dot"></div>
      </div>
    </div>

    <div class="digital-time" id="digitalTime">00:00:00</div>
    <div class="date" id="dateText">Loading date...</div>
    <div class="tagline">वक़्त कभी रुकता नहीं...</div>

    <div class="tool-tabs">
      <button class="tab-btn active" onclick="openPanel('alarmPanel', this)">Alarm</button>
      <button class="tab-btn" onclick="openPanel('timerPanel', this)">Timer</button>
      <button class="tab-btn" onclick="openPanel('stopwatchPanel', this)">Stopwatch</button>
    </div>

    <!-- ALARM PANEL -->
    <div class="panel active" id="alarmPanel">
      <div class="panel-title">⏰ Set Alarm</div>

      <div class="input-row">
        <input type="time" id="alarmInput">
        <button class="action-btn set-btn" onclick="setAlarm()">Set Alarm</button>
      </div>

      <button class="action-btn off-btn" onclick="stopAlarm()">Alarm OFF</button>
      <button class="action-btn reset-btn" onclick="clearAlarm()">Clear Alarm</button>

      <div class="status" id="alarmStatus">No alarm set</div>
    </div>

    <!-- TIMER PANEL -->
    <div class="panel" id="timerPanel">
      <div class="panel-title">⏳ Timer</div>

      <div class="input-row">
        <input type="number" id="timerMinutes" min="0" placeholder="Minutes">
        <input type="number" id="timerSecondsInput" min="0" max="59" placeholder="Seconds">
      </div>

      <div class="big-display" id="timerDisplay">00:00</div>

      <button class="action-btn set-btn" onclick="startTimer()">Start</button>
      <button class="action-btn" onclick="pauseTimer()">Pause</button>
      <button class="action-btn reset-btn" onclick="resetTimer()">Reset</button>

      <div class="status" id="timerStatus">Timer ready</div>
    </div>

    <!-- STOPWATCH PANEL -->
    <div class="panel" id="stopwatchPanel">
      <div class="panel-title">⏱ Stopwatch</div>

      <div class="big-display" id="stopwatchDisplay">00:00:00</div>

      <button class="action-btn set-btn" onclick="startStopwatch()">Start</button>
      <button class="action-btn" onclick="pauseStopwatch()">Pause</button>
      <button class="action-btn reset-btn" onclick="resetStopwatch()">Reset</button>

      <div class="status">Track your time</div>
    </div>
  </div>

  <script>
    const hourHand = document.getElementById("hourHand");
    const minuteHand = document.getElementById("minuteHand");
    const secondHand = document.getElementById("secondHand");
    const digitalTime = document.getElementById("digitalTime");
    const dateText = document.getElementById("dateText");
    const clockCard = document.getElementById("clockCard");

    const alarmInput = document.getElementById("alarmInput");
    const alarmStatus = document.getElementById("alarmStatus");

    const timerMinutes = document.getElementById("timerMinutes");
    const timerSecondsInput = document.getElementById("timerSecondsInput");
    const timerDisplay = document.getElementById("timerDisplay");
    const timerStatus = document.getElementById("timerStatus");

    const stopwatchDisplay = document.getElementById("stopwatchDisplay");

    let alarmTime = null;
    let alarmPlaying = false;

    const alarmAudio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
    alarmAudio.loop = true;

    function updateClock() {
      const now = new Date();

      let hours = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();
      const ampm = hours >= 12 ? "PM" : "AM";

      const hourDeg = ((hours % 12) * 30) + (minutes * 0.5);
      const minuteDeg = (minutes * 6) + (seconds * 0.1);
      const secondDeg = seconds * 6;

      hourHand.style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
      minuteHand.style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
      secondHand.style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;

      let displayHour = hours % 12;
      displayHour = displayHour ? displayHour : 12;

      digitalTime.textContent =
        `${String(displayHour).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")} ${ampm}`;

      dateText.textContent = now.toLocaleDateString("en-IN", {
        weekday: "long",
        day: "2-digit",
        month: "long",
        year: "numeric"
      });

      checkAlarm(hours, minutes, seconds);
    }

    setInterval(updateClock, 1000);
    updateClock();

    function openPanel(panelId, clickedBtn) {
      document.querySelectorAll(".panel").forEach(panel => {
        panel.classList.remove("active");
      });

      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.remove("active");
      });

      document.getElementById(panelId).classList.add("active");
      clickedBtn.classList.add("active");
    }

    function setAlarm() {
      const selectedTime = alarmInput.value;

      if (!selectedTime) {
        alarmStatus.textContent = "Please select alarm time";
        return;
      }

      alarmTime = selectedTime;
      alarmPlaying = false;

      alarmAudio.pause();
      alarmAudio.currentTime = 0;
      clockCard.classList.remove("ringing");

      alarmStatus.textContent = `Alarm set for ${alarmTime}`;
    }

    function checkAlarm(hours, minutes, seconds) {
      const currentTime = `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;

      if (alarmTime === currentTime && seconds === 0 && !alarmPlaying) {
        playAlarm("⏰ Alarm ringing! Click Alarm OFF to stop.");
      }
    }

    function playAlarm(message) {
      alarmPlaying = true;
      alarmStatus.textContent = message;
      timerStatus.textContent = message;
      clockCard.classList.add("ringing");

      alarmAudio.currentTime = 0;

      alarmAudio.play().catch(() => {
        alarmStatus.textContent = "Alarm ready, but browser blocked sound. Click anywhere once, then set alarm again.";
      });
    }

    function stopAlarm() {
      alarmAudio.pause();
      alarmAudio.currentTime = 0;
      alarmPlaying = false;
      clockCard.classList.remove("ringing");

      if (alarmTime) {
        alarmStatus.textContent = `Alarm stopped. Alarm was set for ${alarmTime}`;
      } else {
        alarmStatus.textContent = "Alarm stopped";
      }

      timerStatus.textContent = "Sound stopped";
    }

    function clearAlarm() {
      stopAlarm();
      alarmTime = null;
      alarmInput.value = "";
      alarmStatus.textContent = "Alarm cleared";
    }

    let timerInterval = null;
    let timerTotalSeconds = 0;
    let timerRunning = false;

    function startTimer() {
      if (timerRunning) return;

      if (timerTotalSeconds <= 0) {
        const min = Number(timerMinutes.value) || 0;
        const sec = Number(timerSecondsInput.value) || 0;

        timerTotalSeconds = (min * 60) + sec;

        if (timerTotalSeconds <= 0) {
          timerStatus.textContent = "Enter minutes or seconds";
          return;
        }
      }

      timerRunning = true;
      timerStatus.textContent = "Timer running...";

      timerInterval = setInterval(() => {
        timerTotalSeconds--;
        updateTimerDisplay();

        if (timerTotalSeconds <= 0) {
          clearInterval(timerInterval);
          timerInterval = null;
          timerRunning = false;
          timerTotalSeconds = 0;
          updateTimerDisplay();
          playAlarm("⏰ Timer completed! Click Alarm OFF to stop sound.");
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      timerRunning = false;
      timerStatus.textContent = "Timer paused";
    }

    function resetTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      timerRunning = false;
      timerTotalSeconds = 0;
      timerMinutes.value = "";
      timerSecondsInput.value = "";
      timerDisplay.textContent = "00:00";
      timerStatus.textContent = "Timer reset";
      stopAlarm();
    }

    function updateTimerDisplay() {
      const min = Math.floor(timerTotalSeconds / 60);
      const sec = timerTotalSeconds % 60;

      timerDisplay.textContent =
        `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
    }

    let stopwatchInterval = null;
    let stopwatchSeconds = 0;
    let stopwatchRunning = false;

    function startStopwatch() {
      if (stopwatchRunning) return;

      stopwatchRunning = true;

      stopwatchInterval = setInterval(() => {
        stopwatchSeconds++;
        updateStopwatchDisplay();
      }, 1000);
    }

    function pauseStopwatch() {
      clearInterval(stopwatchInterval);
      stopwatchInterval = null;
      stopwatchRunning = false;
    }

    function resetStopwatch() {
      clearInterval(stopwatchInterval);
      stopwatchInterval = null;
      stopwatchRunning = false;
      stopwatchSeconds = 0;
      stopwatchDisplay.textContent = "00:00:00";
    }

    function updateStopwatchDisplay() {
      const hrs = Math.floor(stopwatchSeconds / 3600);
      const min = Math.floor((stopwatchSeconds % 3600) / 60);
      const sec = stopwatchSeconds % 60;

      stopwatchDisplay.textContent =
        `${String(hrs).padStart(2, "0")}:${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
    }

    document.body.addEventListener("click", () => {
      alarmAudio.load();
    }, { once: true });
  </script>
</body>
</html>
